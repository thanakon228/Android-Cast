name: Build Windows EXE

# สร้างไฟล์ .exe อัตโนมัติ
#  - push tag ขึ้นต้นด้วย v (เช่น v1.0.0) → build แล้วแนบไฟล์ใน Releases
#  - กดรันเองจากแท็บ Actions (workflow_dispatch) → ได้ไฟล์ใน Artifacts
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # ต้องมีเพื่อสร้าง Release + แนบไฟล์

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name AndroidCast app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCast-exe
          path: dist/AndroidCast.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AndroidCast.exe
          generate_release_notes: true
